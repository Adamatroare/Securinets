{% extends 'base.html' %} 
{% block title %}Sign Up - Classmates Only{% endblock %} 
{% block body %}
<div
  class="signup-container"
  style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(
      135deg,
      var(--discord-dark) 0%,
      var(--discord-darkest) 100%
    );
    padding: 20px;
  "
>
  <div
    class="discord-card"
    style="
      max-width: 420px;
      width: 100%;
      background-color: var(--discord-card-bg);
      border: 1px solid var(--discord-border);
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    "
  >
    <h2
      style="
        color: var(--discord-white);
        font-size: 24px;
        margin-bottom: 25px;
        text-align: center;
        font-weight: 600;
      "
    >
      Create an Account
    </h2>

    {% if msg %}
    <div
      style="
        background-color: rgba(237, 66, 69, 0.1);
        border-left: 3px solid var(--discord-red);
        padding: 12px 16px;
        margin-bottom: 20px;
        border-radius: 4px;
      "
    >
      <span style="color: var(--discord-red)">{{ msg }}</span>
    </div>
    {% endif %}

    <form
      action="{{ url_for('sign_up') }}"
      method="POST"
      id="signupForm"
      novalidate
    >
      <div style="margin-bottom: 20px">
        <label
          style="
            display: block;
            color: var(--discord-light-gray);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
          "
        >
          USERNAME
        </label>
        <div id="username-error" class="error-message" style="display: none; color: var(--discord-red); font-size: 13px; margin-bottom: 6px; padding: 4px 8px; background-color: rgba(237, 66, 69, 0.1); border-radius: 4px;"></div>
        <input
          type="text"
          name="username"
          id="username"
          class="discord-input"
          style="width: 100%"
          required
          oninput="validateUsername(this)"
        />
      </div>

      <div style="margin-bottom: 20px">
        <label
          style="
            display: block;
            color: var(--discord-light-gray);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
          "
        >
          PASSWORD
        </label>
        <div id="password-error" class="error-message" style="display: none; color: var(--discord-red); font-size: 13px; margin-bottom: 6px; padding: 4px 8px; background-color: rgba(237, 66, 69, 0.1); border-radius: 4px;"></div>
        <input
          type="password"
          name="password"
          id="password"
          class="discord-input"
          style="width: 100%"
          required
          oninput="validatePassword(this)"
        />
      </div>

      <div style="margin-bottom: 25px">
        <label
          style="
            display: block;
            color: var(--discord-light-gray);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
          "
        >
          CONFIRM PASSWORD
        </label>
        <div id="confirm-error" class="error-message" style="display: none; color: var(--discord-red); font-size: 13px; margin-bottom: 6px; padding: 4px 8px; background-color: rgba(237, 66, 69, 0.1); border-radius: 4px;"></div>
        <input
          type="password"
          name="confirm"
          id="confirm"
          class="discord-input"
          style="width: 100%"
          required
          oninput="validateConfirmPassword(this)"
        />
      </div>

      <button
        type="submit"
        class="discord-btn"
        style="width: 100%; padding: 12px"
      >
        Sign Up
      </button>
    </form>

    <div
      style="
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid var(--discord-border);
      "
    >
      <span style="color: var(--discord-channel-default)">
        Already have an account?
      </span>
      <a
        href="{{ url_for('log_in') }}"
        class="discord-link"
        style="margin-left: 5px"
      >
        Log in
      </a>
    </div>
  </div>

  <div
    style="
      margin-top: 25px;
      text-align: center;
      color: var(--discord-channel-default);
      font-size: 14px;
    "
  >
    <a href="{{ url_for('welcome') }}" class="discord-link"> ← Back to Home </a>
  </div>
</div>

<script>
  function validateUsername(input) {
    const value = input.value.trim();
    const errorElement = document.getElementById("username-error");

    // Clear previous error
    input.classList.remove("input-error", "input-success");
    errorElement.style.display = "none";
    errorElement.textContent = "";

    if (value.length === 0) {
      return;
    }

    // Your backend validation rules
    if (value.length > 15) {
      input.classList.add("input-error");
      errorElement.textContent = "Username must be 15 characters or less";
      errorElement.style.display = "block";
      return false;
    }

    if (!/^[a-zA-Z0-9]+$/.test(value)) {
      input.classList.add("input-error");
      errorElement.textContent =
        "Username can only contain letters and numbers";
      errorElement.style.display = "block";
      return false;
    }

    input.classList.add("input-success");
    return true;
  }

  function validatePassword(input) {
    const value = input.value;
    const errorElement = document.getElementById("password-error");

    // Clear previous error
    input.classList.remove("input-error", "input-success");
    errorElement.style.display = "none";
    errorElement.textContent = "";

    if (value.length === 0) {
      return;
    }

    // Your backend validation rules
    if (value.length > 20) {
      input.classList.add("input-error");
      errorElement.textContent = "Password must be 20 characters or less";
      errorElement.style.display = "block";
      return false;
    }

    if (/[-'#]/.test(value)) {
      input.classList.add("input-error");
      errorElement.textContent = "Password cannot contain -, ', or #";
      errorElement.style.display = "block";
      return false;
    }

    // Validate confirm password matches
    const confirmInput = document.getElementById("confirm");
    if (confirmInput.value) {
      validateConfirmPassword(confirmInput);
    }

    input.classList.add("input-success");
    return true;
  }

  function validateConfirmPassword(input) {
    const value = input.value;
    const password = document.getElementById("password").value;
    const errorElement = document.getElementById("confirm-error");

    // Clear previous error
    input.classList.remove("input-error", "input-success");
    errorElement.style.display = "none";
    errorElement.textContent = "";

    if (value.length === 0) {
      return;
    }

    if (value !== password) {
      input.classList.add("input-error");
      errorElement.textContent = "Passwords do not match";
      errorElement.style.display = "block";
      return false;
    }

    input.classList.add("input-success");
    return true;
  }

  document
    .getElementById("signupForm")
    .addEventListener("submit", function (event) {
      const username = document.getElementById("username");
      const password = document.getElementById("password");
      const confirm = document.getElementById("confirm");

      // Validate all fields
      const isUsernameValid = validateUsername(username);
      const isPasswordValid = validatePassword(password);
      const isConfirmValid = validateConfirmPassword(confirm);

      if (!isUsernameValid || !isPasswordValid || !isConfirmValid) {
        event.preventDefault();
        return false;
      }

      return true;
    });
</script>
{% endblock %}
